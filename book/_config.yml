# 1. Algemene repository instellingen (Nodig voor de 'ValueError' fix)
repository:
  url: https://github.com/nerdyJuffie/PythonProgrammeren
  path_to_book: ""
  branch: PythonProgrammeren2

execute:
  execute_notebooks: "off"

only_build_toc_files: true

html:
  favicon: "figures/TB_favicon.ico"
  baseurl: "https://nerdyjuffie.github.io/PythonProgrammeren/"
  use_repository_button: true
  use_download_button: true

# 2. Specifieke thema en raket instellingen
sphinx:
  config:
    html_js_files:
    - https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.4/require.min.js
    thebe_config:
      use_thebe_lite: true
    html_theme_options:
      repository_url: "https://github.com/nerdyJuffie/PythonProgrammeren"
      path_to_docs: ""
      repository_branch: "PythonProgrammeren2"
      use_edit_page_button: false
      use_repository_button: true
      use_issues_button: false
      launch_buttons:
        thebe: true
        jupyterlite: true
      logo:
        text: Programmeren in Python
        image_light: TeachBooks_logo.svg
        image_dark: TeachBooks_logo.svg
    html_show_copyright: false
  extra_extensions:
    - teachbooks_favourites
    - sphinx_exercise
    - jupyterlite_sphinx
