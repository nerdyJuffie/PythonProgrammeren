# TeachBooks / JupyterBook configuration

repository:
  url: https://github.com/nerdyJuffie/PythonProgrammeren
  path_to_book: ""
  branch: main

author: TeachBooks Team, built with <a href="https://teachbooks.io">TeachBooks</a>, <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="license noopener noreferrer"">CC BY 4.0<img style="height:22px!important;margin-left:3px;vertical-align:text-bottom;" src="https://mirrors.creativecommons.org/presskit/icons/cc.svg" alt=""><img style="height:22px!important;margin-left:3px;vertical-align:text-bottom;" src="https://mirrors.creativecommons.org/presskit/icons/by.svg" alt=""></a>

execute:
  execute_notebooks: "off"
  exclude_patterns: []
  timeout: 30
  allow_errors: false

html:
  use_multitoc_numbering: true
  use_repository_button: true
  use_download_button: true
  use_thebe: true   # <— BELANGRIJK: activeert Thebe

sphinx:
  extra_extensions:
    - teachbooks_favourites
    - sphinx_exercise
  config:
    language: nl
    html_js_files:
      - https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.4/require.min.js
    thebe_config:
      use_thebe_lite: true
      # ❗ PROBLEEMREGEL VERWIJDERD:
      # exclude_patterns: ["**/_*.yml", "**/*.md", "**/*.ipynb"]
      # Hierdoor worden .ipynb-bestanden NIET meer uitgesloten
    html_favicon: "figures/TB_favicon.ico"
    html_baseurl: "https://nerdyjuffie.github.io/PythonProgrammeren"
    html_theme_options:
      logo:
        text: Programmeren in Python
        image_light: TeachBooks_logo.svg
        image_dark: TeachBooks
